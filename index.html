<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mexicy GPA CS Modern Academy</title>

<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<button id="install-btn">⬇️ Install</button>

<div id="splash-screen">
<img src="icon-192.png">
</div>

<div class="container">

<div class="hero-header">

<img src="icon-512.png" class="hero-icon">

<h1 class="hero-title">
Mexicy GPA CS Modern Academy
</h1>

<p class="hero-subtitle">Ahmed Taher</p>

<p class="hero-role">Software Engineer</p>

<button id="dark-mode-toggle">🌙</button>

</div>

<div class="global-summary">

<span>إجمالي الساعات: <b id="global-hours">0</b></span>

<span>إجمالي النقاط: <b id="global-points">0.00</b></span>

</div>

<div class="gpa-box">

<div class="gpa-value">
<span>GPA:</span>
<span id="global-gpa">0.00</span>
</div>

<div class="gpa-progress">
<div class="gpa-bar" id="gpa-bar"></div>
</div>

<div class="gpa-letter" id="global-letter">0</div>

<button onclick="shareGPA()" class="share-btn">
📤 مشاركة الـ GPA
</button>

</div>

<div class="levels" id="levels-container"></div>

</div>

<script src="script.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
